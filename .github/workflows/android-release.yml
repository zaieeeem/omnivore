name: Android Release APK

on:
  push:
    branches:
      - main
    paths:
      - 'android/**'
      - '.github/workflows/android-release.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-release:
    name: Build signed release APK and AAB
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android/Omnivore
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # The keystore decoded here is the Play UPLOAD key: once the app is
      # enrolled in Play App Signing, Google generates and holds the actual
      # app signing key and re-signs distributions, so this key only
      # authenticates Play uploads (and signs the sideload/QA APK artifact).
      - name: Decode signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/omnivore-upload.keystore"

      # APK = sideload / rig-QA vehicle; AAB = the future Google Play upload.
      - name: Build signed release APK and AAB
        env:
          ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/omnivore-upload.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease bundleRelease --no-daemon

      - name: Remove decoded keystore
        if: always()
        run: rm -f "$RUNNER_TEMP/omnivore-upload.keystore"

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: omnivore-release-apk
          path: android/Omnivore/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: omnivore-release-aab
          path: android/Omnivore/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
          retention-days: 30

      # --- Ship to Google Play (Internal testing) -------------------------------
      # Fires only when PLAY_SERVICE_ACCOUNT_JSON is set. Read via env so the JSON's
      # embedded quotes don't break the shell presence test. The r0adkll action is a
      # `uses:` step, so releaseFiles is resolved from the repo root (not the job's
      # android/Omnivore working-directory).
      - name: Check for Play service account
        id: playsa
        env:
          PLAY_SA: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "$PLAY_SA" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::PLAY_SERVICE_ACCOUNT_JSON not set — skipping Play upload (AAB on the GH artifact only)."
          fi

      - name: Upload AAB to Google Play (internal track)
        if: ${{ steps.playsa.outputs.present == 'true' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.error314.omnivore
          releaseFiles: android/Omnivore/app/build/outputs/bundle/release/*.aab
          track: internal
          status: completed
