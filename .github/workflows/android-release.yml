name: Android Release APK

on:
  push:
    branches:
      - main
    paths:
      - 'android/**'
      - '.github/workflows/android-release.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-release-apk:
    name: Build signed release APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android/Omnivore
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/omnivore-upload.keystore"

      - name: Assemble release APK
        env:
          ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/omnivore-upload.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Remove decoded keystore
        if: always()
        run: rm -f "$RUNNER_TEMP/omnivore-upload.keystore"

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: omnivore-release-apk
          path: android/Omnivore/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30
